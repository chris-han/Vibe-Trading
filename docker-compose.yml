services:
  vibe-trading:
    container_name: vibe-trading
    working_dir: /app
    env_file:
      - agent/.env
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - HTTP_PROXY=${DOCKER_HTTP_PROXY:-}
        - HTTPS_PROXY=${DOCKER_HTTPS_PROXY:-}
        - NO_PROXY=${DOCKER_NO_PROXY:-}
    environment:
      HTTP_PROXY: ${DOCKER_HTTP_PROXY:-}
      HTTPS_PROXY: ${DOCKER_HTTPS_PROXY:-}
      NO_PROXY: ${DOCKER_NO_PROXY:-}
      HERMES_HOME: /app/agent/.hermes
      VIBE_TRADING_ROOT: /app
    ports:
      - "8899:8899"
    expose:
      - "8899"
    volumes:
      - dokploy-hermes:/app/agent/.hermes
      - dokploy-workspaces:/app/workspaces
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8899/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  dokploy-hermes:
  dokploy-workspaces:
