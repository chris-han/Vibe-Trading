services:
  vibe-trading:
    image: semantier:vibe-trading
    container_name: vibe-trading
    working_dir: /app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - HTTP_PROXY=${DOCKER_HTTP_PROXY:-}
        - HTTPS_PROXY=${DOCKER_HTTPS_PROXY:-}
        - ALL_PROXY=${DOCKER_ALL_PROXY:-}
        - NO_PROXY=${DOCKER_NO_PROXY:-}
    environment:
      # These values come from the shell or the repo-root .env when using
      # docker compose. A plain `docker run` must pass `--env-file .env`
      # (or equivalent `-e` flags), otherwise Feishu OAuth stays disabled.
      # Proxy settings
      HTTP_PROXY: ${DOCKER_HTTP_PROXY:-}
      HTTPS_PROXY: ${DOCKER_HTTPS_PROXY:-}
      ALL_PROXY: ${DOCKER_ALL_PROXY:-}
      NO_PROXY: ${DOCKER_NO_PROXY:-}
      # Application constants
      HERMES_HOME: /app/agent/.hermes
      VIBE_TRADING_ROOT: /app
      VIBE_TRADING_FRONTEND_ROOT: /app/frontend
      VIBE_TRADING_FRONTEND_DIST: /app/frontend/dist
      # LLM Provider (set the ones you use in Dokploy UI)
      HERMES_INFERENCE_PROVIDER: ${HERMES_INFERENCE_PROVIDER:-}
      HERMES_MODEL: ${HERMES_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_DEPLOYMENT_NAME: ${AZURE_OPENAI_DEPLOYMENT_NAME:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      KIMI_BASE_URL: ${KIMI_BASE_URL:-}
      KIMI_USER_AGENT: ${KIMI_USER_AGENT:-}
      KIMI_REASONING_EFFORT: ${KIMI_REASONING_EFFORT:-}
      KIMI_MAX_OUTPUT_TOKENS: ${KIMI_MAX_OUTPUT_TOKENS:-}
      KIMI_CONTEXT_WINDOW: ${KIMI_CONTEXT_WINDOW:-}
      LANGCHAIN_PROVIDER: ${LANGCHAIN_PROVIDER:-}
      LANGCHAIN_MODEL_NAME: ${LANGCHAIN_MODEL_NAME:-}
      LANGCHAIN_TEMPERATURE: ${LANGCHAIN_TEMPERATURE:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-}
      # Runtime
      TIMEOUT_SECONDS: ${TIMEOUT_SECONDS:-}
      MAX_RETRIES: ${MAX_RETRIES:-}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      API_AUTH_KEY: ${API_AUTH_KEY:-}
      DEFAULT_WORKSPACE_SLUG: ${DEFAULT_WORKSPACE_SLUG:-}
      ENABLE_SESSION_RUNTIME: ${ENABLE_SESSION_RUNTIME:-}
      # Feishu OAuth
      FEISHU_OAUTH_ENABLED: ${FEISHU_OAUTH_ENABLED:-}
      FEISHU_OAUTH_APP_ID: ${FEISHU_OAUTH_APP_ID:-}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_OAUTH_REDIRECT_URI: ${FEISHU_OAUTH_REDIRECT_URI:-}
      FEISHU_SESSION_SECRET: ${FEISHU_SESSION_SECRET:-}
      # Feishu Bot
      FEISHU_CONNECTION_MODE: ${FEISHU_CONNECTION_MODE:-}
      FEISHU_ENCRYPT_KEY: ${FEISHU_ENCRYPT_KEY:-}
      FEISHU_VERIFICATION_TOKEN: ${FEISHU_VERIFICATION_TOKEN:-}
      FEISHU_DOMAIN: ${FEISHU_DOMAIN:-}
      FEISHU_STREAM_UPDATE_INTERVAL_SECONDS: ${FEISHU_STREAM_UPDATE_INTERVAL_SECONDS:-}
    ports:
      - "8899:8899"
    expose:
      - "8899"
    volumes:
      - dokploy-hermes:/app/agent/.hermes
      - dokploy-workspaces:/app/workspaces
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8899/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  dokploy-hermes:
  dokploy-workspaces:
