services:
  vibe-trading:
    working_dir: /app
    build:
      context: .
      args:
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    ports:
      - "8899:8899"
    env_file:
      - agent/.env
    environment:
      - HERMES_ENABLE_PROJECT_PLUGINS=true
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
    volumes:
      - fin-data:/app/data
      - fin-runs:/app/agent/runs
      - fin-sessions:/app/agent/sessions
    restart: unless-stopped

volumes:
  fin-data:
  fin-runs:
  fin-sessions:
